<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="fireworks.css"> 
</head>
<body>
  <dialog class="start-game" open>
    <form class="start-game" action="start-game" method="dialog">
      <div class="player-name-input">
        <label for="player-one-name">Player One Name:</label>
        <input id="player-one-name" name="player-one-name" type="text" min="3" max="18">
      </div>
      <div class="player-name-input">
        <label for="player-two-name">Player Two Name:</label>
        <input id="player-two-name" name="player-two-name" type="text" min="3" max="18">
      </div>
      <button class="btn-start">Start Game</button>
    </form>
  </dialog>
  <dialog class="game-over">
    <div class="firework"></div>
    <div class="firework"></div>
    <div class="firework"></div>
    <div class="game-over">
      <h2 id="winner-name"></h2>
      <button class="btn-restart" formmethod="dialog">Restart</button>
    </div>
  </dialog>
  <div class="game">
    <div class="info">
      <h1>Tic Tac Toe</h1>
      <div class="players-names">
        <div id="name-p1-display" class="active-player">Player One</div>
        <div id="name-p2-display" >Player Two</div>
      </div>
      <p class="game-info"></p>
    </div>
    <div class="board">
      <button class="cell" data-row="0" data-column="0"></button>
      <button class="cell" data-row="0" data-column="1"></button>
      <button class="cell" data-row="0" data-column="2"></button>
      <button class="cell" data-row="1" data-column="0"></button>
      <button class="cell" data-row="1" data-column="1"></button>
      <button class="cell" data-row="1" data-column="2"></button>
      <button class="cell" data-row="2" data-column="0"></button>
      <button class="cell" data-row="2" data-column="1"></button>
      <button class="cell" data-row="2" data-column="2"></button>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
